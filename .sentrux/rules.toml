[limits]
max_file_lines = 500
max_function_lines = 80

[structure]
enforce_layering = true

[layers]
"app.api" = ["app.api", "app.core", "app.services"]
"app.services" = ["app.core", "app.db", "app.services"]
"app.db" = ["app.core", "app.db"]

[forbidden_imports]
"app.db" = ["app.api"]
"app.services" = ["app.api"]
"src/services/sync-push-service.js" = ["src/services/sync-pull-service.js", "src/services/sync-cycle-runner.js", "src/services/sync-engine.js"]
"src/services/sync-pull-service.js" = ["src/services/sync-push-service.js", "src/services/sync-cycle-runner.js", "src/services/sync-engine.js"]
"src/services/sync-cycle-runner.js" = ["src/services/sync-engine.js"]
"src/services/sync-loop.js" = ["src/services/sync-engine.js"]
