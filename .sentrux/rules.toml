[limits]
max_file_lines = 700
max_function_lines = 120

[structure]
enforce_layering = true

[layers]
"src/services/sync-engine.js" = ["src/services/sync-cycle-runner.js", "src/services/sync-loop.js", "src/services/sync-push", "src/services/sync-pull", "src/services/sync-retry-scheduler.js", "src/services/sync-state-machine.js", "src/services/sync-conflict-adapter.js", "src/services/desktop-runtime.js", "src/db/repositories.js"]
"src/services/sync-cycle-runner.js" = ["src/services/sync-shared/error-classification.js"]
"src/services/sync-push" = ["src/services/sync-shared/batching.js", "src/domain/sync"]
"src/services/sync-pull" = ["src/domain/sync"]
"src/services/sync-shared" = []
"src/domain/sync" = []

[forbidden_imports]
"src/services/sync-push/push-orchestrator.js" = ["src/services/sync-pull", "src/services/sync-cycle-runner.js", "src/services/sync-engine.js"]
"src/services/sync-pull/pull-orchestrator.js" = ["src/services/sync-push", "src/services/sync-cycle-runner.js", "src/services/sync-engine.js"]
"src/services/sync-cycle-runner.js" = ["src/services/sync-engine.js", "src/services/sync-push", "src/services/sync-pull"]
"src/domain/sync" = ["src/services"]
