[limits]
max_file_lines = 650
max_function_lines = 120
max_dependency_depth = 6
max_fan_out = 14

[structure]
enforce_layering = true

[layers]
"src/domain" = []
"src/services/sync-shared" = ["src/domain"]
"src/services/ports" = []
"src/services/sync-push" = ["src/domain", "src/services/sync-shared", "src/services/ports"]
"src/services/sync-pull" = ["src/domain", "src/services/sync-shared", "src/services/ports"]
"src/services" = ["src/domain", "src/services/sync-shared", "src/services/sync-push", "src/services/sync-pull", "src/services/ports"]
"src/db" = []
"electron" = []
"desktop/src" = []

[forbidden_imports]
"src/domain" = ["src/services", "src/db", "server.js", "electron"]
"src/services/sync-push" = ["src/services/sync-pull", "src/services/sync-cycle-runner.js", "src/services/sync-engine.js"]
"src/services/sync-pull" = ["src/services/sync-push", "src/services/sync-cycle-runner.js", "src/services/sync-engine.js"]
"src/services/sync-cycle-runner.js" = ["src/services/sync-engine.js"]
"electron/preload.js" = ["server.js", "src/db"]
