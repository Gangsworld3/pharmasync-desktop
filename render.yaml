services:
  - type: web
    name: pharmasync-backend
    runtime: python
    plan: starter
    region: frankfurt
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn app.main:app --app-dir backend --host 0.0.0.0 --port 10000
    healthCheckPath: /health
    envVars:
      - key: PHARMASYNC_DATABASE_URL
        fromDatabase:
          name: pharmasync-db
          property: connectionString
      - key: PHARMASYNC_JWT_SECRET
        generateValue: true
      - key: PHARMASYNC_DEFAULT_ADMIN_PASSWORD
        generateValue: true
      - key: PHARMASYNC_REDIS_URL
        sync: false
      - key: PHARMASYNC_REDIS_KEY_PREFIX
        value: pharmasync
      - key: PHARMASYNC_SECURITY_ALERT_WEBHOOK_URL
        sync: false
      - key: PHARMASYNC_APP_NAME
        value: PharmaSync FastAPI
      - key: ENV
        value: production
      - key: PHARMASYNC_LOG_LEVEL
        value: info

databases:
  - name: pharmasync-db
    plan: starter
